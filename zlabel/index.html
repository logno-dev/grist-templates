<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grist Custom Widget</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root,
    html,
    * {
      padding: 0;
      margin: 0;
      background-color: white;
      color: black;
    }

    #app {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      padding: 1rem;
    }

    .date {
      font-size: 0.6em;
    }

    .sample {
      font-size: 1em;
      font-weight: bold;
    }

    .lab {
      font-size: 0.5em;
    }

    .weight {
      font-size: 0.8em;
    }

    .split {
      display: flex;
      justify-content: space-between;
    }

    .page {
      break-after: page;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="page" id="qr"></div>
    <div id="label"></div>
  </div>
  <script>
    // Register global error handler.
    // Tell Grist we are ready.
    grist.ready({
      columns: ['date', 'lab', 'sampleId', 'weight', 'poNum'],
      // Inform about required access level.
      requiredAccess: 'read table',
      allowSelectBy: true
    });

    const labelList = document.getElementById("label");

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        console.log('Copied to clipboard:', text);
      }).catch(err => {
        console.error('Failed to copy: ', err);
        // Fallback for older browsers
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
      });
    }

    grist.onRecords((d) => {

      labelList.innerHTML = ""

      const records = grist.mapColumnNames(d)

      const qrcode = document.getElementById("qr");
      qrcode.innerHTML = "";

      const value = "https://foodmicro.app/cs/os-photos/upload?po=" + records[0].poNum || "";


      new QRCode(qrcode, {
        text: value,
        width: 128,
        height: 128
      });

      records.forEach((item) => {
        labelList.innerHTML += `<div class="page"><span class="date">${item.date}</span><br><span class="sample">${item.sampleId}</span><div class="split"><span class="lab">${item.lab}</span><span class="weight">${item.weight}g</span></div></div>`
      })

    })
  </script>
</body>

</html>
