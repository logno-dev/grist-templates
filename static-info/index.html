<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Info</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root,
    html,
    * {
      padding: 0;
      margin: 0;
      background-color: white;
      color: black;
    }

    #app {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      padding: 1rem;
    }

    table {
      border-collapse: collapse;
    }

    td,
    th {
      border: 1px solid black;
      padding: .3rem;
    }

    .total {
      text-align: right;
    }

    th,
    .total,
    .total strong {
      background-color: #f0f0f0;
    }

    .flex {
      display: flex;
      gap: 2rem;
    }


    .sample-id-cell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .copy-btn {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 10px;
      cursor: pointer;
      min-width: fit-content;
    }

    .copy-btn:hover {
      background: #0056b3;
    }

    .copy-btn:active {
      background: #004085;
    }

    #note {
      padding: 1rem;
      text-align: center;
      border: solid 1px black;
      border-radius: 6px;
      flex-grow: 1;
    }

    #note p {
      text-align: center;
    }

    #status {
      padding: 1rem;
      text-align: center;
      border-radius: 6px;
    }

    .pending,
    .pending * {
      background-color: #f4f4f4;
      color: black;
    }

    .approved,
    .approved * {
      background-color: #1f7012;
      color: white;
    }

    .altered,
    .altered * {
      background-color: #db7100;
      color: white;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="flex">
      <div>
        <h2>SGS FedEx #</h2>
        <p id="fedex"></p>
      </div>
      <div>
        <h2>SGS SARF Email</h2>
        <p id="email"></p>
      </div>
    </div>
  </div>
  <script>
    grist.ready({
      columns: ['fedEx', 'email'],
      requiredAccess: 'read table',
      allowSelectBy: true
    });

    const fedex = document.getElementById("fedex");
    const email = document.getElementById("email");

    function copyToClipboard(text) {
      navigator.clipboard.writeText(String(text));
    }

    function render(record) {
      if (!record) return;

      fedex.innerHTML = "";
      email.innerHTML = "";

      const fedexText = document.createTextNode(record.fedEx ?? "");
      const fedexBtn = document.createElement("button");
      fedexBtn.textContent = "Copy";
      fedexBtn.className = "copy-btn";
      fedexBtn.onclick = () => copyToClipboard(record.fedEx ?? "");

      fedex.append(fedexText, " ", fedexBtn);

      const emailText = document.createTextNode(record.email ?? "");
      const emailBtn = document.createElement("button");
      emailBtn.textContent = "Copy";
      emailBtn.className = "copy-btn";
      emailBtn.onclick = () => copyToClipboard(record.email ?? "");

      email.append(emailText, " ", emailBtn);
    }

    grist.onRecords((records) => {
      const mappedRecords = records.map(grist.mapColumnNames);
      render(mappedRecords[0]);
    });
  </script>
</body>

</html>
